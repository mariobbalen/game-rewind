version: '1.0'

services: 
  frontend:
    build: 
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports: 
      - "8080:80"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
  backend:
    build: 
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: backend
    ports: 
      - "5000:5000"
    volumes:
      - ./src/backend:/app
    depends_on:
      - mongo-db
  # Não foi possível utilizar uma imagem mais leve do mongo, devido a sua inexistencia.
  mongo-db:
    image: mongo:7.0
    container_name: mongo-db
    ports: 
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db 
volumes:
  mongo-data: